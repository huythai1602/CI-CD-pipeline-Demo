name: Deploy

on:
  push:
    branches: [develop, main]
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  packages: read
  deployments: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy-staging:
    name: Deploy to staging
    if: github.ref == 'refs/heads/develop' || github.event.inputs.environment == 'staging'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.health_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: lower
        run: echo "image_name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Deploy staging image
        id: deploy
        env:
          DEPLOY_ENV: staging
          IMAGE: ${{ env.REGISTRY }}/${{ steps.lower.outputs.image_name }}:${{ github.sha }}
          APP_URL: ${{ secrets.STAGING_URL }}
        run: bash scripts/deploy.sh

      - name: Publish staging deployment summary
        if: always()
        run: |
          echo "### Staging deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: ${{ env.REGISTRY }}/${{ steps.lower.outputs.image_name }}:${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Status: ${{ steps.deploy.outputs.status || 'failed' }}" >> "$GITHUB_STEP_SUMMARY"

  deploy-production:
    name: Deploy to production
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'production'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.health_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: lower
        run: echo "image_name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Deploy production image
        id: deploy
        env:
          DEPLOY_ENV: production
          IMAGE: ${{ env.REGISTRY }}/${{ steps.lower.outputs.image_name }}:${{ github.sha }}
          APP_URL: ${{ secrets.PRODUCTION_URL }}
        run: bash scripts/deploy.sh

      - name: Publish production deployment summary
        if: always()
        run: |
          echo "### Production deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: ${{ env.REGISTRY }}/${{ steps.lower.outputs.image_name }}:${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Status: ${{ steps.deploy.outputs.status || 'failed' }}" >> "$GITHUB_STEP_SUMMARY"
